name: Deploy

on:
  push:
    branches:
      - main

# BURASI EKSİK: Çağıran workflow'un yetki alabilmesi için burada da tanımlı olmalı
permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  call-central-deploy:
    uses: LetStartCCorp/.github/.github/workflows/central-deploy.yml@main
    with:
      service_name: 'e-test-pack'
    secrets: inherit # Secret'ları (CF_API_TOKEN vs.) aktarması için bu şart
