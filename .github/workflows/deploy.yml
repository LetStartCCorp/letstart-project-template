name: Trigger Deploy

on:
  push:
    branches: [ main ]

jobs:
  call-central-workflow:
    # Organizasyon ismin ve merkezi reponun yolu
    uses: LetStartCCorp/.github/.github/workflows/central-deploy.yml@main
    with:
      # Reponun adını dinamik olarak merkezi workflow'a gönderir
      service_name: ${{ github.event.repository.name }}
    secrets: inherit # Org bazlı secret'ları içeri aktarır